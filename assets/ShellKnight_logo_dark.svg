<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#000000"/>

  <g transform="translate(400,210)">

    <!-- Wrench left -->
    <g transform="rotate(-42) translate(-150,-20)">
      <rect x="-11" y="-55" width="22" height="85" rx="4" fill="#00CC44"/>
      <ellipse cx="0" cy="-58" rx="20" ry="20" fill="#00CC44"/>
      <ellipse cx="0" cy="-58" rx="10" ry="10" fill="#000000"/>
      <ellipse cx="0" cy="32" rx="20" ry="20" fill="#00CC44"/>
      <ellipse cx="0" cy="32" rx="10" ry="10" fill="#000000"/>
    </g>

    <!-- Wrench right -->
    <g transform="rotate(42) translate(150,-20)">
      <rect x="-11" y="-55" width="22" height="85" rx="4" fill="#00CC44"/>
      <ellipse cx="0" cy="-58" rx="20" ry="20" fill="#00CC44"/>
      <ellipse cx="0" cy="-58" rx="10" ry="10" fill="#000000"/>
      <ellipse cx="0" cy="32" rx="20" ry="20" fill="#00CC44"/>
      <ellipse cx="0" cy="32" rx="10" ry="10" fill="#000000"/>
    </g>

    <!-- Spatula/screwdriver left -->
    <g transform="rotate(42) translate(-150,-20)">
      <rect x="-6" y="-75" width="12" height="105" rx="3" fill="#00CC44"/>
      <rect x="-10" y="-88" width="20" height="16" rx="2" fill="#00CC44"/>
      <rect x="-13" y="28" width="26" height="10" rx="2" fill="#00CC44"/>
      <rect x="-8" y="38" width="16" height="18" rx="2" fill="#00CC44"/>
    </g>

    <!-- Spatula/screwdriver right -->
    <g transform="rotate(-42) translate(150,-20)">
      <rect x="-6" y="-75" width="12" height="105" rx="3" fill="#00CC44"/>
      <rect x="-10" y="-88" width="20" height="16" rx="2" fill="#00CC44"/>
      <rect x="-13" y="28" width="26" height="10" rx="2" fill="#00CC44"/>
      <rect x="-8" y="38" width="16" height="18" rx="2" fill="#00CC44"/>
    </g>

    <!-- Outer shield ring/circle accent -->
    <circle cx="0" cy="0" r="115" fill="none" stroke="#00CC44" stroke-width="5" opacity="0.4"/>

    <!-- Shield body -->
    <path d="M-78,55 L-85,-15 L-65,-75 L0,-95 L65,-75 L85,-15 L78,55 Q40,95 0,115 Q-40,95 -78,55 Z"
          fill="#1a1f1a" stroke="#00CC44" stroke-width="4"/>

    <!-- Helmet top ridge -->
    <path d="M-60,-75 L0,-95 L60,-75 L65,-50 L0,-62 L-65,-50 Z" fill="#252a25"/>

    <!-- Helmet visor slits -->
    <rect x="-42" y="-42" width="84" height="5" rx="2.5" fill="#00CC44" opacity="0.6"/>
    <rect x="-37" y="-31" width="74" height="5" rx="2.5" fill="#00CC44" opacity="0.6"/>
    <rect x="-32" y="-20" width="64" height="5" rx="2.5" fill="#00CC44" opacity="0.6"/>

    <!-- Plume -->
    <path d="M-8,-95 Q-25,-148 -8,-175 Q8,-148 12,-95" fill="#00CC44"/>
    <path d="M8,-95 Q22,-140 34,-162 Q28,-135 18,-95" fill="#00CC44" opacity="0.65"/>

    <!-- Shield lower badge -->
    <path d="M-42,8 L-47,52 Q0,88 0,88 Q0,88 47,52 L42,8 Z"
          fill="#00CC44" fill-opacity="0.12" stroke="#00CC44" stroke-width="2"/>

    <!-- SK> badge text -->
    <text x="0" y="48" text-anchor="middle"
          font-family="Courier New, monospace" font-size="26" font-weight="700" fill="#00CC44">SK&gt;</text>

    <!-- Shield bottom chevron accent -->
    <path d="M-78,55 Q0,115 0,115 Q0,115 78,55" fill="none" stroke="#00CC44" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="264" y="398" text-anchor="start"
        font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#6b7280">Shell</text>
  <text x="416" y="398" text-anchor="start"
        font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#00CC44">Knight</text>
</svg>